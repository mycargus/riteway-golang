name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hooks:
    name: Hook tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Run hook tests
        run: bash .claude/hooks/block-publish_test.sh

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: fmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then
            echo "gofmt: unformatted files:"
            echo "$out"
            exit 1
          fi

      - name: vet
        run: go vet ./...

  test:
    name: Test (Go ${{ matrix.go }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        go: ["1.21", "1.22", "1.23", "1.24"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}

      - name: test
        run: go test -count=1 -race ./...

  test-scripts:
    name: Script tests
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"

      - name: test-scripts
        run: bash scripts/test-release.sh
